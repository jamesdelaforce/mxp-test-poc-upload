<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASOS — Mixpanel Onboarding Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F7F3;
  --surface: #FFFFFF;
  --surface2: #F0EDE5;
  --border: #E4E0D6;
  --border2: #C8C4BA;
  --text: #1C1A17;
  --text2: #6E6B63;
  --text3: #A8A49C;
  --green: #1A6B42;
  --green-bg: #EAF5EE;
  --amber: #7A5200;
  --amber-bg: #FFF4D4;
  --blue: #1A4A82;
  --blue-bg: #EAF0FA;
  --red: #821A1A;
  --red-bg: #FAECEC;
  --accent: #2952E3;
  --mono: 'DM Mono', monospace;
  --serif: 'Instrument Serif', serif;
  --sans: 'DM Sans', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── AUTH ──────────────────────────────────────────── */
#auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;width:340px;text-align:center}
.auth-card h2{font-family:var(--serif);font-size:22px;font-weight:400;margin-bottom:6px}
.auth-card p{font-size:13px;color:var(--text2);margin-bottom:1.75rem;line-height:1.55}
.auth-card input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:var(--mono);font-size:14px;background:var(--bg);color:var(--text);margin-bottom:10px;outline:none;letter-spacing:.08em;transition:border-color .15s}
.auth-card input:focus{border-color:var(--accent)}
.auth-card button{width:100%;padding:11px;background:var(--text);color:#fff;border:none;border-radius:8px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.auth-card button:hover{opacity:.82}
.auth-err{font-size:12px;color:var(--red);margin-top:8px;min-height:18px}
.auth-users{margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border);text-align:left}
.auth-users p{font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.user-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;margin:0 4px 4px 0}
.user-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

/* ── TOPBAR ────────────────────────────────────────── */
#app{display:none}
.topbar{position:sticky;top:0;z-index:10;height:50px;background:rgba(248,247,243,.93);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 2rem;gap:14px}
.topbar-brand{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.04em;color:var(--text)}
.topbar-div{width:1px;height:14px;background:var(--border2)}
.topbar-name{font-size:13px;color:var(--text2)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px}
.sync-led{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sync-led.stale{background:var(--amber)}
.user-badge{font-size:11px;font-family:var(--mono);color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px}

/* ── LAYOUT ────────────────────────────────────────── */
.wrap{max-width:920px;margin:0 auto;padding:2.5rem 2rem 5rem}

/* ── PLAN HEADER ───────────────────────────────────── */
.plan-head{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:2rem;margin-bottom:2rem;border-bottom:1px solid var(--border)}
.plan-head h1{font-family:var(--serif);font-size:30px;font-weight:400;letter-spacing:-.2px;margin-bottom:5px}
.plan-head-meta{font-size:13px;color:var(--text2);line-height:1.6}
.status-chip{font-size:12px;font-family:var(--mono);padding:5px 13px;border-radius:20px;white-space:nowrap;margin-top:4px}
.chip-green{background:var(--green-bg);color:var(--green)}
.chip-amber{background:var(--amber-bg);color:var(--amber)}
.chip-red{background:var(--red-bg);color:var(--red)}
.chip-blue{background:var(--blue-bg);color:var(--blue)}

/* ── METRICS ───────────────────────────────────────── */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:2.25rem}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem}
.m-label{font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.m-val{font-size:28px;font-weight:300;letter-spacing:-.5px;line-height:1}
.m-sub{font-size:11px;color:var(--text3);margin-top:5px}

/* ── SECTION ───────────────────────────────────────── */
.sec{margin-bottom:2.5rem}
.sec-label{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:1rem;display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── TWO COL ───────────────────────────────────────── */
.two{display:grid;grid-template-columns:1fr 1fr;gap:1.75rem;margin-bottom:2.5rem}

/* ── HEALTH ────────────────────────────────────────── */
.h-row{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.h-name{font-size:13px;color:var(--text2);width:130px;flex-shrink:0}
.h-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.h-fill{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.h-pct{font-size:12px;font-family:var(--mono);color:var(--text2);width:34px;text-align:right}

/* ── GOALS ─────────────────────────────────────────── */
.goal{display:flex;align-items:flex-start;gap:9px;margin-bottom:10px;font-size:13px;line-height:1.5}
.g-icon{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;margin-top:1px}
.g-done{background:var(--green-bg);color:var(--green)}
.g-open{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}

/* ── MILESTONES ────────────────────────────────────── */
.ms-row{display:flex;gap:14px;padding:11px 0;border-bottom:1px solid var(--border)}
.ms-row:last-child{border-bottom:none}
.ms-ind{display:flex;flex-direction:column;align-items:center;padding-top:3px}
.ms-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ms-tail{width:1px;flex:1;background:var(--border);margin-top:5px}
.ms-body{flex:1}
.ms-name{font-size:14px;color:var(--text)}
.ms-date{font-size:12px;font-family:var(--mono);color:var(--text3);margin-top:3px}
.ms-tag{display:inline-block;font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:4px;margin-top:6px}

/* ── UPDATES ───────────────────────────────────────── */
.update{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:10px;transition:border-color .15s}
.update:hover{border-color:var(--border2);border-left-color:var(--accent)}
.u-top{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.u-chan{font-size:11px;font-family:var(--mono);background:var(--surface2);color:var(--text2);padding:2px 8px;border-radius:4px}
.u-emoji{font-size:14px}
.u-date{font-size:11px;font-family:var(--mono);color:var(--text3);margin-left:auto}
.u-text{font-size:13px;color:var(--text);line-height:1.65}
.u-author{font-size:11px;color:var(--text3);margin-top:5px}
.empty-updates{font-size:13px;font-family:var(--mono);color:var(--text3);padding:2rem;text-align:center;background:var(--surface);border:1px dashed var(--border);border-radius:10px}

/* ── STAKEHOLDERS ──────────────────────────────────── */
.stakeholders{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.sk{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-family:var(--mono);font-weight:500;flex-shrink:0}
.sk-name{font-size:13px;font-weight:500}
.sk-role{font-size:11px;color:var(--text2);margin-top:2px}

/* ── FOOTER ────────────────────────────────────────── */
.footer{margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:11px;font-family:var(--mono);color:var(--text3)}

@media(max-width:660px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .two{grid-template-columns:1fr}
  .stakeholders{grid-template-columns:repeat(2,1fr)}
  .plan-head{flex-direction:column;gap:1rem}
  .wrap{padding:1.5rem 1rem 4rem}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-card">
    <div style="font-size:26px;margin-bottom:1rem">🔐</div>
    <h2>Success plan</h2>
    <p>Enter your access code to view this plan.</p>
    <input type="password" id="pw" placeholder="Access code" autocomplete="off">
    <button onclick="tryAuth()">View plan →</button>
    <div class="auth-err" id="auth-err"></div>
    <div class="auth-users">
      <p>Access granted to</p>
      <span class="user-pill"><span class="user-dot"></span>Azariah Kusi-Yeboah</span>
      <span class="user-pill"><span class="user-dot"></span>Mike Lombardi</span>
      <span class="user-pill"><span class="user-dot"></span>Laurent Camara</span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="topbar">
    <span class="topbar-brand">CSP</span>
    <div class="topbar-div"></div>
    <span class="topbar-name" id="nav-name">—</span>
    <div class="topbar-right">
      <div class="sync-badge">
        <span class="sync-led" id="sync-led"></span>
        <span id="sync-text">—</span>
      </div>
      <div class="user-badge" id="nav-user">—</div>
    </div>
  </nav>

  <div class="wrap" id="wrap">
    <div style="padding:3rem;text-align:center;font-family:var(--mono);font-size:13px;color:var(--text3)">Loading…</div>
  </div>
</div>

<script>
// ── USERS ────────────────────────────────────────────────────────────────────
// Each user has a name and a SHA-256 hash of their access code.
// To generate: https://emn178.github.io/online-tools/sha256.html
// REPLACE these hashes with real ones before deploying.
const USERS = [
  { name: "Azariah Kusi-Yeboah", hash: "REPLACE_WITH_SHA256_OF_AZARIAHS_CODE" },
  { name: "Mike Lombardi",        hash: "REPLACE_WITH_SHA256_OF_MIKES_CODE"    },
  { name: "Laurent Camara",       hash: "REPLACE_WITH_SHA256_OF_LAURENTS_CODE" },
  { name: "Tom Scott",            hash: "REPLACE_WITH_SHA256_OF_TOMS_CODE"     },
  // Internal team — Mixpanel
  { name: "Mixpanel CSM",         hash: "REPLACE_WITH_SHA256_OF_CSM_CODE"     },
];

async function sha256(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

async function tryAuth(){
  const val=document.getElementById('pw').value.trim();
  if(!val)return;
  const h=await sha256(val);
  const user=USERS.find(u=>u.hash===h);
  // DEMO MODE: any non-empty input works. Remove this line in production:
  const matched=user||{name:"Demo user"};
  if(matched){
    sessionStorage.setItem('csp_user',matched.name);
    document.getElementById('auth').style.display='none';
    document.getElementById('app').style.display='block';
    boot(matched.name);
  }else{
    document.getElementById('auth-err').textContent='Incorrect access code.';
  }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryAuth()});

// Auto-resume session
const _sess=sessionStorage.getItem('csp_user');
if(_sess){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='block';
  boot(_sess);
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
function boot(userName){
  document.getElementById('nav-user').textContent=userName;
  render(PLAN_DATA, userName);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(d, userName){
  const syncTime=new Date(d.last_synced);
  const minsAgo=Math.round((Date.now()-syncTime)/60000);
  const syncStr=minsAgo<2?'Just synced':minsAgo<60?`${minsAgo}m ago`:minsAgo<1440?`${Math.round(minsAgo/60)}h ago`:syncTime.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  document.getElementById('nav-name').textContent=`${d.account} · ${d.period}`;
  document.getElementById('sync-text').textContent=`${syncStr} · ${d.sync_channel}`;
  if(minsAgo>1440) document.getElementById('sync-led').classList.add('stale');

  const chips={
    'On track':'chip-green','At risk':'chip-amber',
    'Off track':'chip-red','Completed':'chip-blue'
  };
  const nodeCol={complete:'var(--green)',active:'var(--accent)',risk:'#C47A00',upcoming:'var(--border2)'};
  const tagSty={
    complete:'background:var(--green-bg);color:var(--green)',
    active:'background:var(--blue-bg);color:var(--blue)',
    risk:'background:var(--amber-bg);color:var(--amber)',
    upcoming:'background:var(--surface2);color:var(--text3)'
  };
  const tagLbl={complete:'Complete',active:'In progress',upcoming:'Upcoming'};

  document.getElementById('wrap').innerHTML=`
  <div class="plan-head">
    <div>
      <h1>${d.account}</h1>
      <div class="plan-head-meta">Customer success plan · ${d.period}<br>AE: ${d.ae} · CSM: ${d.csm}</div>
    </div>
    <span class="status-chip ${chips[d.status]||'chip-green'}">${d.status}</span>
  </div>

  <div class="metrics">
    <div class="metric"><div class="m-label">Health score</div><div class="m-val" style="color:var(--green)">${d.metrics.health_score}</div><div class="m-sub">${d.metrics.health_delta}</div></div>
    <div class="metric"><div class="m-label">Days to renewal</div><div class="m-val">${d.metrics.days_to_renewal}</div><div class="m-sub">${d.metrics.renewal_date}</div></div>
    <div class="metric"><div class="m-label">Open milestones</div><div class="m-val">${d.metrics.open_milestones}</div><div class="m-sub">${d.metrics.milestones_at_risk} at risk</div></div>
    <div class="metric"><div class="m-label">NPS</div><div class="m-val">${d.metrics.nps}</div><div class="m-sub">${d.metrics.nps_date}</div></div>
  </div>

  <div class="two">
    <div class="sec">
      <div class="sec-label">Health breakdown</div>
      ${d.health.map(h=>`
        <div class="h-row">
          <span class="h-name">${h.label}</span>
          <div class="h-track"><div class="h-fill" style="width:${h.score}%;background:${h.score>=75?'var(--green)':h.score>=50?'#C47A00':'var(--red)'}"></div></div>
          <span class="h-pct">${h.score}%</span>
        </div>`).join('')}
    </div>
    <div class="sec">
      <div class="sec-label">Success goals</div>
      ${d.goals.map(g=>`
        <div class="goal">
          <span class="g-icon ${g.done?'g-done':'g-open'}">${g.done?'✓':''}</span>
          ${g.text}
        </div>`).join('')}
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">Milestones</div>
    ${d.milestones.map((m,i)=>`
      <div class="ms-row">
        <div class="ms-ind">
          <div class="ms-dot" style="background:${nodeCol[m.status]}"></div>
          ${i<d.milestones.length-1?'<div class="ms-tail"></div>':''}
        </div>
        <div class="ms-body">
          <div class="ms-name">${m.name}</div>
          <div class="ms-date">${m.date}</div>
          <span class="ms-tag" style="${tagSty[m.status]}">${m.status_label||tagLbl[m.status]||m.status}</span>
        </div>
      </div>`).join('')}
  </div>

  <div class="sec">
    <div class="sec-label">📌 pinned updates from slack</div>
    ${d.updates.length===0
      ?'<div class="empty-updates">No pinned updates yet.<br>React with 📌 🚨 ✅ 💡 in Slack to publish here.</div>'
      :d.updates.map(u=>`
        <div class="update">
          <div class="u-top">
            <span class="u-chan">${u.channel}</span>
            <span class="u-emoji">${u.emoji}</span>
            <span class="u-date">${u.date}</span>
          </div>
          <div class="u-text">${u.text}</div>
          <div class="u-author">${u.author}</div>
        </div>`).join('')}
  </div>

  <div class="sec">
    <div class="sec-label">Stakeholders</div>
    <div class="stakeholders">
      ${d.stakeholders.map(s=>`
        <div class="sk">
          <div class="av" style="background:${s.color_bg};color:${s.color_text}">${s.initials}</div>
          <div><div class="sk-name">${s.name}</div><div class="sk-role">${s.role}</div></div>
        </div>`).join('')}
    </div>
  </div>

  <div class="footer">
    <span>Viewing as ${userName}</span>
    <span>Last synced ${syncTime.toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span>
  </div>`;
}
